<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Routine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="planpage" style="max-width:1080px; margin:0 auto;">

  <header class="plan-intro" style="margin-bottom:40px;">
    <h1 style="font-family:'Gowun Batang',serif; font-weight:700; font-size:40px; line-height:1.2; margin:0 0 14px; color:oklch(0.26 0.012 70);">Daily Routine</h1>

    <div style="position:relative; display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
      <div id="dateTrigger" aria-hidden="true" style="display:inline-flex; align-items:center; gap:4px; padding:6px; margin:-6px; pointer-events:none;">
        <span id="todayLabelDate" style="font-size:13px; font-weight:700; color:oklch(0.32 0.012 70);"></span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:oklch(0.55 0.012 70); flex:none;"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <span style="font-size:13px; color:oklch(0.60 0.012 70);">일정을 보고 있어요</span>
      <input type="date" id="datePicker" class="no-print" aria-label="날짜 선택" style="position:absolute; top:0; left:0; width:100%; height:100%; margin:0; padding:0; border:none; background:transparent; opacity:0; cursor:pointer; z-index:1;">
    </div>

    <div style="display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-top:22px;">
      <div class="no-print" style="display:inline-flex; padding:4px; background:oklch(0.95 0.006 80); border-radius:999px; gap:2px;">
        <button id="btnViewA" style="padding:9px 22px;border:none;border-radius:999px;font-family:inherit;font-size:14px;cursor:pointer;transition:all .15s;">타임라인</button>
        <button id="btnViewB" style="padding:9px 22px;border:none;border-radius:999px;font-family:inherit;font-size:14px;cursor:pointer;transition:all .15s;">블록 카드</button>
        <button id="btnViewC" style="padding:9px 22px;border:none;border-radius:999px;font-family:inherit;font-size:14px;cursor:pointer;transition:all .15s;">라운드 시계</button>
      </div>

      <div style="display:flex; flex-wrap:wrap; gap:8px 12px; font-size:11px; color:oklch(0.46 0.012 70);">
        <span style="display:inline-flex; align-items:center; gap:5px;"><span style="width:6px;height:6px;border-radius:50%;background:oklch(0.74 0.018 70);"></span>일상·휴식</span>
        <span style="display:inline-flex; align-items:center; gap:5px;"><span style="width:6px;height:6px;border-radius:50%;background:oklch(0.66 0.055 150);"></span>운동</span>
        <span style="display:inline-flex; align-items:center; gap:5px;"><span style="width:6px;height:6px;border-radius:50%;background:oklch(0.62 0.06 245);"></span>한국사 공부</span>
        <span style="display:inline-flex; align-items:center; gap:5px;"><span style="width:6px;height:6px;border-radius:50%;background:oklch(0.64 0.07 45);"></span>이직 준비</span>
        <span style="display:inline-flex; align-items:center; gap:5px;"><span style="width:6px;height:6px;border-radius:50%;background:oklch(0.62 0.06 305);"></span>취미·창작</span>
        <span style="display:inline-flex; align-items:center; gap:5px;"><span style="width:6px;height:6px;border-radius:50%;background:oklch(0.80 0.05 95);"></span>자유시간</span>
      </div>
    </div>
  </header>

  <!-- ============ 1a TIMELINE ============ -->
  <article id="1a" data-opt="1a" class="optcard" style="background:#fff; border:1px solid oklch(0.92 0.006 78); border-radius:22px; margin-bottom:36px; box-shadow:0 1px 2px rgba(0,0,0,0.02), 0 18px 40px -28px rgba(0,0,0,0.12);">
    <div style="display:flex; flex-wrap:wrap; gap:18px; justify-content:space-between; align-items:flex-start; margin-bottom:24px;">
      <div style="display:flex; gap:14px; align-items:center;">
        <div>
          <div style="font-size:18px; font-weight:600; color:oklch(0.28 0.012 70);">타임라인</div>
          <div style="font-size:13px; color:oklch(0.56 0.012 70);">하루를 시간 순서대로 따라가는 세로 타임라인</div>
        </div>
      </div>
      <div style="display:flex; gap:16px; align-items:center;">
        <div style="position:relative; width:54px; height:54px; border-radius:50%;" id="ringA">
          <div style="position:absolute; inset:6px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:oklch(0.40 0.04 210);" id="pctA"></div>
        </div>
        <div style="font-size:12.5px; color:oklch(0.56 0.012 70); min-width:64px;" id="countA"></div>
        <div class="no-print" style="display:flex; gap:8px;">
          <button id="printA" style="font-size:12.5px; padding:7px 13px; border:1px solid oklch(0.86 0.008 75); background:#fff; border-radius:9px; cursor:pointer; color:oklch(0.40 0.012 70);">인쇄</button>
          <button id="resetA" style="font-size:12.5px; padding:7px 13px; border:1px solid oklch(0.90 0.008 75); background:oklch(0.97 0.005 80); border-radius:9px; cursor:pointer; color:oklch(0.56 0.012 70);">초기화</button>
        </div>
      </div>
    </div>

    <div id="blocksA"></div>
  </article>

  <!-- ============ 1b BLOCK CARDS ============ -->
  <article id="1b" data-opt="1b" class="optcard" style="background:#fff; border:1px solid oklch(0.92 0.006 78); border-radius:22px; margin-bottom:36px; box-shadow:0 1px 2px rgba(0,0,0,0.02), 0 18px 40px -28px rgba(0,0,0,0.12);">
    <div style="display:flex; flex-wrap:wrap; gap:18px; justify-content:space-between; align-items:flex-start; margin-bottom:24px;">
      <div style="display:flex; gap:14px; align-items:center;">
        <div>
          <div style="font-size:18px; font-weight:600; color:oklch(0.28 0.012 70);">블록 카드</div>
          <div style="font-size:13px; color:oklch(0.56 0.012 70);">오전 · 오후 · 저녁 세 블록으로 나눈 카드형</div>
        </div>
      </div>
      <div style="display:flex; gap:16px; align-items:center;">
        <div style="position:relative; width:54px; height:54px; border-radius:50%;" id="ringB">
          <div style="position:absolute; inset:6px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:oklch(0.40 0.04 210);" id="pctB"></div>
        </div>
        <div style="font-size:12.5px; color:oklch(0.56 0.012 70); min-width:64px;" id="countB"></div>
        <div class="no-print" style="display:flex; gap:8px;">
          <button id="printB" style="font-size:12.5px; padding:7px 13px; border:1px solid oklch(0.86 0.008 75); background:#fff; border-radius:9px; cursor:pointer; color:oklch(0.40 0.012 70);">인쇄</button>
          <button id="resetB" style="font-size:12.5px; padding:7px 13px; border:1px solid oklch(0.90 0.008 75); background:oklch(0.97 0.005 80); border-radius:9px; cursor:pointer; color:oklch(0.56 0.012 70);">초기화</button>
        </div>
      </div>
    </div>

    <div style="display:flex; flex-wrap:wrap; gap:18px;">
      <div style="flex:1; min-width:240px;">
        <div style="font-size:13px; font-weight:600; color:oklch(0.48 0.012 70); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid oklch(0.93 0.006 78);">🌅 오전</div>
        <div id="blocksB-morning" style="display:flex; flex-direction:column; gap:10px;"></div>
      </div>
      <div style="flex:1; min-width:240px;">
        <div style="font-size:13px; font-weight:600; color:oklch(0.48 0.012 70); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid oklch(0.93 0.006 78);">☀️ 오후</div>
        <div id="blocksB-afternoon" style="display:flex; flex-direction:column; gap:10px;"></div>
      </div>
      <div style="flex:1; min-width:240px;">
        <div style="font-size:13px; font-weight:600; color:oklch(0.48 0.012 70); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid oklch(0.93 0.006 78);">🌙 저녁</div>
        <div id="blocksB-evening" style="display:flex; flex-direction:column; gap:10px;"></div>
      </div>
    </div>
  </article>

  <!-- ============ 1c ROUND CLOCK ============ -->
  <article id="1c" data-opt="1c" class="optcard" style="background:#fff; border:1px solid oklch(0.92 0.006 78); border-radius:22px; margin-bottom:36px; box-shadow:0 1px 2px rgba(0,0,0,0.02), 0 18px 40px -28px rgba(0,0,0,0.12);">
    <div style="display:flex; flex-wrap:wrap; gap:18px; justify-content:space-between; align-items:flex-start; margin-bottom:24px;">
      <div style="display:flex; gap:14px; align-items:center;">
        <div>
          <div style="font-size:18px; font-weight:600; color:oklch(0.28 0.012 70);">라운드 시계</div>
          <div style="font-size:13px; color:oklch(0.56 0.012 70);">24시간 원형 시계로 하루를 한눈에</div>
        </div>
      </div>
      <div style="display:flex; gap:16px; align-items:center;">
        <div style="font-size:12.5px; color:oklch(0.56 0.012 70); min-width:64px;" id="countC"></div>
        <div class="no-print" style="display:flex; gap:8px;">
          <button id="printC" style="font-size:12.5px; padding:7px 13px; border:1px solid oklch(0.86 0.008 75); background:#fff; border-radius:9px; cursor:pointer; color:oklch(0.40 0.012 70);">인쇄</button>
          <button id="resetC" style="font-size:12.5px; padding:7px 13px; border:1px solid oklch(0.90 0.008 75); background:oklch(0.97 0.005 80); border-radius:9px; cursor:pointer; color:oklch(0.56 0.012 70);">초기화</button>
        </div>
      </div>
    </div>

    <div style="display:flex; flex-wrap:wrap; gap:36px; align-items:center;">
      <div style="flex:1; min-width:280px; display:flex; justify-content:center; position:relative;">
        <div style="position:relative; width:100%; max-width:340px;" id="clockWrap">
          <div id="clockSvg"></div>
          <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none;">
            <div id="pctC" style="font-family:'Gowun Batang',serif; font-size:34px; font-weight:700; color:oklch(0.36 0.04 210); line-height:1;"></div>
            <div id="dayLabelShort" style="font-size:11.5px; color:oklch(0.58 0.012 70); margin-top:6px;"></div>
          </div>
        </div>
      </div>
      <div style="flex:1; min-width:280px;">
        <div id="blocksC" style="display:flex; flex-direction:column; gap:7px;"></div>
      </div>
    </div>
  </article>

</div>

<script src="script.js"></script>
</body>
</html>
