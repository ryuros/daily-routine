<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Routine</title>
<link rel="apple-touch-icon" href="image_appicon.png">
<link rel="icon" href="image_appicon.png" type="image/png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== Top Navigation ===== -->
<nav class="top-nav no-print">
  <span class="top-nav-title">Daily Routine</span>
  <!-- 우측 메뉴 아이콘 자리 -->
</nav>

<div class="planpage" style="max-width:1080px; margin:0 auto;">

  <header class="plan-intro">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
      <div style="position:relative; display:inline-flex; align-items:center; gap:6px;">
        <div id="dateTrigger" aria-hidden="true" style="display:inline-flex; align-items:center; gap:6px; pointer-events:none;">
          <span id="todayLabelDate" style="font-size:24px; font-weight:700; color:oklch(0.26 0.012 70); line-height:1.2;"></span>
          <svg width="12" height="8" viewBox="0 0 20 12" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" style="color:oklch(0.55 0.012 70); flex:none; margin-top:3px;"><path d="M2 2L10 10L18 2"/></svg>
        </div>
        <input type="date" id="datePicker" class="no-print" aria-label="날짜 선택" style="position:absolute; top:0; left:0; width:100%; height:100%; margin:0; padding:0; border:none; background:transparent; opacity:0; cursor:pointer; z-index:1;">
      </div>
      <div class="no-print" style="display:flex; gap:4px; flex-shrink:0; align-items:center;">
<button id="printCurrent" style="width:34px; height:34px; padding:0; border:1px solid oklch(0.929 0.013 255.508); background:transparent; border-radius:999px; cursor:pointer; color:oklch(0.46 0.012 70); display:flex; align-items:center; justify-content:center;" aria-label="인쇄">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ============ 1a TIMELINE ============ -->
  <article id="1a" data-opt="1a" class="optcard" style="background:#fff; border:1px solid oklch(0.968 0.007 247.896); border-radius:24px; margin-bottom:36px; box-shadow:0 1px 2px rgba(0,0,0,0.02), 0 18px 40px -28px rgba(0,0,0,0.12);">

    <div class="timeline-layout">
      <!-- 원형 시계 -->
      <div class="timeline-clock">
        <div style="position:relative; width:100%; max-width:360px; margin:0 auto;">
          <div id="clockSvgTop"></div>
          <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none;">
            <div id="pctAclock" style="font-size:28px; font-weight:700; color:oklch(0.30 0.012 70); line-height:1;"></div>
            <div id="dayLabelShort" style="font-size:11px; color:oklch(0.58 0.012 70); margin-top:5px;"></div>
          </div>
        </div>
        <div style="display:flex; align-items:center; justify-content:center; gap:8px; margin-top:24px;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:oklch(0.30 0.012 70); flex-shrink:0;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          <div id="currentTimeClock" style="font-size:35px; font-weight:700; color:oklch(0.30 0.012 70); letter-spacing:0.02em;"></div>
        </div>
      </div>
      <!-- 타임라인 리스트 -->
      <div class="timeline-list">
        <div class="no-print" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
          <button id="applyDefault" style="height:34px; padding:0 14px; border:1px solid oklch(0.929 0.013 255.508); border-radius:999px; background:transparent; cursor:pointer; font-family:inherit; font-size:12.5px; color:oklch(0.446 0.043 257.281); display:inline-flex; align-items:center; gap:5px;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            루틴 불러오기
          </button>
          <div style="display:flex; gap:4px; align-items:center;">
            <button id="resetCurrent" style="width:34px; height:34px; padding:0; border:1px solid oklch(0.929 0.013 255.508); background:transparent; border-radius:999px; cursor:pointer; color:oklch(0.46 0.012 70); display:flex; align-items:center; justify-content:center;" aria-label="초기화">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-4.8"></path></svg>
            </button>
            <button id="editBtn" style="height:34px; padding:0 12px; border:none; background:oklch(0.372 0.044 257.287); border-radius:999px; cursor:pointer; color:#fff; display:flex; align-items:center; gap:5px; font-family:inherit; font-size:12.5px;" aria-label="편집">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
              편집
            </button>
          </div>
        </div>
        <div id="blocksA"></div>
      </div>
    </div>
  </article>

  <!-- 현재 루틴 저장하기 -->
  <div class="no-print" style="text-align:center; padding:0 0 28px;">
    <button id="saveRoutineBtn" style="padding:16px 24px; border:1px solid oklch(0.929 0.013 255.508); border-radius:999px; background:transparent; cursor:pointer; font-family:inherit; font-size:14px; color:oklch(0.446 0.043 257.281); display:inline-flex; align-items:center; gap:7px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
      현재 루틴 저장하기
    </button>
  </div>

  <!-- ============ 1b BOARD ============ -->
  <article id="1b" data-opt="1b" class="optcard" style="display:none;">
    <div class="board-cols" style="display:flex; flex-wrap:wrap; gap:18px;">
      <div style="flex:1; min-width:220px;">
        <div class="board-col-head">
          <span class="board-col-dot" style="background:oklch(0.72 0.012 70);"></span>
          <span class="board-col-label">실행전</span>
          <span id="countNotStarted" class="board-col-count"></span>
        </div>
        <div id="blocksB-notStarted" style="display:flex; flex-direction:column; gap:8px;"></div>
      </div>
      <div style="flex:1; min-width:220px;">
        <div class="board-col-head">
          <span class="board-col-dot" style="background:oklch(0.62 0.09 145);"></span>
          <span class="board-col-label">실행완료</span>
          <span id="countCompleted" class="board-col-count"></span>
        </div>
        <div id="blocksB-completed" style="display:flex; flex-direction:column; gap:8px;"></div>
      </div>
      <div style="flex:1; min-width:220px;">
        <div class="board-col-head">
          <span class="board-col-dot" style="background:oklch(0.66 0.10 45);"></span>
          <span class="board-col-label">미완료</span>
          <span id="countIncomplete" class="board-col-count"></span>
        </div>
        <div id="blocksB-incomplete" style="display:flex; flex-direction:column; gap:8px;"></div>
      </div>
    </div>
  </article>

  <div style="height:40px;"></div>

</div>

<!-- ===== Floating Tab Bar ===== -->
<div class="tab-floating no-print">
  <button id="btnViewA" class="tab-btn">Timeline</button>
  <button id="btnViewB" class="tab-btn">Board</button>
</div>

<!-- ===== 루틴 불러오기 모달 ===== -->
<div id="routineLoadOverlay" class="edit-overlay hidden" role="dialog" aria-modal="true">
  <div class="routine-modal">
    <div class="routine-modal-head">
      <span>루틴 불러오기</span>
      <button id="routineLoadClose" class="edit-close-btn" aria-label="닫기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="routine-modal-body" id="routineLoadBody"></div>
  </div>
</div>

<!-- ===== 루틴 저장 모달 ===== -->
<div id="routineSaveOverlay" class="edit-overlay routine-save-overlay hidden" role="dialog" aria-modal="true">
  <div class="routine-modal routine-save-modal">
    <div class="routine-modal-head">
      <span>루틴 저장하기</span>
      <button id="routineSaveClose" class="edit-close-btn" aria-label="닫기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="routine-modal-body" style="padding:20px 24px;">
      <input id="routineNameInput" type="text" placeholder="루틴 이름 입력" maxlength="30">
    </div>
    <div class="routine-modal-foot">
      <button id="routineSaveCancel">취소</button>
      <button id="routineSaveConfirm">저장</button>
    </div>
  </div>
</div>

<!-- ===== 편집 모달 ===== -->
<div id="editOverlay" class="edit-overlay hidden" role="dialog" aria-modal="true">
  <div class="edit-modal">
    <div class="edit-modal-head">
      <span id="editDateLabel" style="font-size:20px; font-weight:700; color:oklch(0.26 0.012 70);"></span>
      <button id="editClose" class="edit-close-btn" aria-label="닫기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="edit-preset-section">
      <div class="edit-preset-item">
        <span class="edit-preset-label">기상시간</span>
        <input type="time" id="presetWake" class="edit-preset-input">
      </div>
      <div class="edit-preset-item">
        <span class="edit-preset-label">취침시간</span>
        <input type="time" id="presetSleep" class="edit-preset-input">
      </div>
    </div>
    <div class="edit-modal-body" id="editBody"></div>
    <div class="edit-modal-foot">
      <button id="editAddItem">+ 항목 추가</button>
      <div style="display:flex; gap:8px;">
        <button id="editCancel">취소</button>
        <button id="editSave">저장</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
